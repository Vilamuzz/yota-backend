info:
  contact: {}
paths:
  /admin/ambulances/history/{id}:
    get:
      consumes:
      - application/json
      description: Get a list of ambulance history records with pagination for admin
      parameters:
      - description: Ambulance ID
        in: path
        name: id
        required: true
        type: string
      - description: Filter by service category
        in: query
        name: service_category
        type: string
      - description: Number of items to return
        in: query
        name: limit
        type: integer
      - description: Cursor for next page
        in: query
        name: next_cursor
        type: string
      - description: Cursor for previous page
        in: query
        name: prev_cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.Response'
      security:
      - BearerAuth: []
      summary: List ambulance history for admin
      tags:
      - Ambulance History
  /admin/ambulances/history/driver:
    get:
      consumes:
      - application/json
      description: Get a list of ambulance history records with pagination for driver
      parameters:
      - description: Filter by service category
        in: query
        name: service_category
        type: string
      - description: Number of items to return
        in: query
        name: limit
        type: integer
      - description: Cursor for next page
        in: query
        name: next_cursor
        type: string
      - description: Cursor for previous page
        in: query
        name: prev_cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.Response'
      security:
      - BearerAuth: []
      summary: List ambulance history for driver
      tags:
      - Ambulance History
  /admin/ambulances/history/driver/monthly-trend:
    get:
      description: Retrieve aggregated monthly trend of ambulance history for a given
        year for the authenticated driver.
      parameters:
      - description: Filter by year
        in: query
        name: year
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/app_ambulance_history.HistoryMonthlyTrendRecord'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.Response'
      security:
      - BearerAuth: []
      summary: Get driver's own ambulance history monthly trend
      tags:
      - Ambulance History
  /admin/ambulances/history/driver/summary:
    get:
      consumes:
      - application/json
      description: Returns total service counts grouped by category for the authenticated
        driver.
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: startDate
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: endDate
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/app_ambulance_history.SummaryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.Response'
      security:
      - BearerAuth: []
      summary: Get driver's own ambulance history summary
      tags:
      - Ambulance History
  /admin/ambulances/history/monthly-trend:
    get:
      description: Retrieve aggregated monthly trend of ambulance history (social_service,
        mortuary_service, patient_service, emergency_service, other_service) for a
        given year (admin only)
      parameters:
      - description: Filter by year
        in: query
        name: year
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/app_ambulance_history.HistoryMonthlyTrendRecord'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.Response'
      security:
      - BearerAuth: []
      summary: Get ambulance history monthly trend
      tags:
      - Ambulance History
  /admin/ambulances/history/summary:
    get:
      consumes:
      - application/json
      description: Returns total service counts grouped by category for all ambulances.
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: startDate
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: endDate
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/app_ambulance_history.SummaryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.Response'
      security:
      - BearerAuth: []
      summary: Get all ambulance history summary for admin
      tags:
      - Ambulance History
  /admin/ambulances/requests/{id}/accept:
    patch:
      consumes:
      - application/json
      description: Accept an ambulance service request and assign it to an ambulance
      parameters:
      - description: Ambulance Request ID
        in: path
        name: id
        required: true
        type: string
      - description: Ambulance ID to assign
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/app_ambulance_service_request.AcceptAmbulanceServiceRequestPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Response'
      security:
      - BearerAuth: []
      summary: Accept Ambulance Service Request
      tags:
      - Ambulance Service Requests
  /admin/ambulances/requests/assigned:
    get:
      consumes:
      - application/json
      description: Get a list of ambulance requests assigned to the authenticated
        ambulance driver
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Search by applicant name
