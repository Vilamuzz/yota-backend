paths:
  /ambulance-history:
    get:
      consumes:
      - application/json
      description: Get a list of ambulance history records with pagination
      parameters:
      - description: Filter by ambulance ID
        in: query
        name: ambulance_id
        type: integer
      - description: Filter by service category
        in: query
        name: service_category
        type: string
      - description: Number of items to return
        in: query
        name: limit
        type: integer
      - description: Cursor for next page
        in: query
        name: next_cursor
        type: string
      - description: Cursor for previous page
        in: query
        name: prev_cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.Response'
      summary: List ambulance history
      tags:
      - Ambulance History
    post:
      consumes:
      - application/json
      description: Create a new ambulance history record with the provided details
      parameters:
      - description: Ambulance history details
        in: body
        name: ambulance_history
        required: true
        schema:
          $ref: '#/definitions/ambulance_history.CreateAmbulanceHistoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.Response'
      security:
      - BearerAuth: []
      summary: Create a new ambulance history record
      tags:
      - Ambulance History
  /ambulance-history/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an existing ambulance history record by ID
      parameters:
      - description: Ambulance History ID
        in: path
        name: id
        required: true
